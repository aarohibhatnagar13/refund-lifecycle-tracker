<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Refund Detail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <p><a href="index.html">← Back to Dashboard</a></p>
        
        <div class="card" id="detailsCard">
            <h2 id="detOrderId">Loading...</h2>
            <p><strong>Status:</strong> <span id="detStatus"></span></p>
            <p><strong>Amount:</strong> <span id="detAmount"></span></p>
            <p><strong>Customer:</strong> <span id="detCustomer"></span></p>
        </div>

        <div class="card">
            <h3>Actions</h3>
            <div id="actionButtons"></div>
            <hr style="margin: 20px 0; border:0; border-top:1px solid #eee">
            <button class="danger" onclick="simulateRaceCondition()">Simulate Race Condition</button>
            <button class="danger" onclick="simulateRaceCondition()">Simulate Race Condition</button>
            <p id="raceResult" style="font-size: 12px; color: #666;"></p>
            
            <!-- NEW WEBHOOK BUTTON -->
            <hr style="margin: 20px 0; border:0; border-top:1px solid #eee">
            <button style="background: #6366f1;" onclick="simulateStripeWebhook()">Pretend to be Stripe (Send Webhook)</button>
            
            <p id="raceResult" style="font-size: 12px; color: #666;"></p>
        </div>

        <div class="card">
            <h3>Transition History</h3>
            <div id="timeline" class="timeline"></div>
        </div>
    </div>
    <script type="module" src="/script.js"></script>
</body>
</html>
